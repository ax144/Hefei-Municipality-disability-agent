name: Auto Push

on:
  schedule:
    - cron: '0 1 */2 * *'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install requests
    
    - name: Run auto push
      run: python scripts/auto_push.py
    
    - name: Run tests
      run: python scripts/test_push.py
