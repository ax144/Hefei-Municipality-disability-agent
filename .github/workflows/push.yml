name: 合皖助联定时推送

on:
  schedule:
    # 每2天北京时间上午9点执行 (UTC时间凌晨1点)
    - cron: '0 1 */2 * *'
  workflow_dispatch:  # 手动触发

jobs:
  push:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests coze-coding-dev-sdk beautifulsoup4
    
    - name: 运行推送脚本
      env:
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
      run: python scripts/auto_push.py
